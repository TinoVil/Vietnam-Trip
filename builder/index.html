<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Vietnam 2026 · Itinerary Builder</title>
<meta name="theme-color" content="#0f9d76">
<link rel="apple-touch-icon" href="../apple-touch-icon.png">
<script type="module" src="../sync.js"></script>
<style>
/* ==========================================================
   VIETNAM 2026 · EDIT THE PLAN
   Travel Book design system — mobile first, same tokens as the app.
   Class names are load-bearing (the JS hooks them) — restyled, not renamed.
========================================================== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#2D74B9; --blue-soft:#E7F2FC;
  --green:#1E8B65; --green-soft:#E7F7F2;
  --gold:#C89B3C; --gold-soft:#FFF7E2; --gold-ink:#A97700;
  --red:#C23B3B; --red-soft:#FCECEC;
  --purple:#7C5CDB; --purple-soft:#F0EBFB;
  --teal:#2494A2; --teal-soft:#E6F4F6;
  --sand:#F8F5EF;
  --navy:#243447; --navy-2:#1A2736;
  --grey:#667085; --grey-2:#98A2B3; --grey-3:#7A8793;
  --ink:#243447; --body:#52606D;
  --line:#E3E7EC; --line-2:#EDF2F7;
  --panel:#fff; --panel2:#F7F9FB;
  --bg:#F2F4F7; --faint:#98A2B3; --mut:#667085;
  --r:18px;
  /* domain colours — identical to the app */
  --c-location:#2494A2; --c-transport:#C89B3C;
  --c-accommodation:#2D74B9; --c-activities:#1E8B65;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--ink);line-height:1.5;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;
  padding-top:calc(56px + env(safe-area-inset-top));overscroll-behavior-y:none}
button{font:inherit;cursor:pointer;color:inherit;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--ink)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#d8dee5;border-radius:8px;border:3px solid transparent;background-clip:content-box}
::-webkit-scrollbar-track{background:transparent}

/* ---------- app bar (mirrors the app) ---------- */
header{position:fixed;top:0;left:0;right:0;z-index:60;
  background:linear-gradient(120deg,var(--navy),#31517A);color:#fff;
  padding-top:env(safe-area-inset-top);height:calc(56px + env(safe-area-inset-top));
  display:flex;align-items:center;gap:8px;padding-left:6px;padding-right:10px;
  box-shadow:0 2px 14px rgba(16,26,39,.25)}
.logo{display:none}
.brand{display:flex;flex-direction:column;line-height:1.15;min-width:0;flex:1}
.brand b{font-size:16px;font-weight:800;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand small{font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:.65;font-weight:600}
.hspace{display:none}
.hbtn{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);border-radius:10px;
  padding:8px 10px;color:#fff;font-weight:700;font-size:12.5px;display:inline-grid;place-items:center;
  white-space:nowrap;text-decoration:none}
.hbtn:active{background:rgba(255,255,255,.26)}
.hbtn.primary{background:rgba(255,255,255,.9);color:var(--navy);border-color:transparent}
.saveflag{font-size:10px;color:rgba(255,255,255,.72);max-width:120px;line-height:1.25;text-align:right}

/* ---------- layout ---------- */
.wrap{display:block}
.board{padding:12px 12px calc(28px + env(safe-area-inset-bottom));max-width:760px;margin:0 auto}
.board-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.board-head h2{font-size:15px;font-weight:800;letter-spacing:-.2px}
.legend{display:flex;gap:10px;flex-wrap:wrap;color:var(--grey);font-size:11px}
.legend span{display:inline-flex;align-items:center;gap:5px}
.dot{width:8px;height:8px;border-radius:3px;display:inline-block}

/* ---------- item library (slide-over) ---------- */
.palbackdrop{position:fixed;inset:0;background:rgba(16,26,39,.5);z-index:70;opacity:0;
  pointer-events:none;transition:opacity .25s}
.palbackdrop.open{opacity:1;pointer-events:auto}
.palette{position:fixed;top:0;bottom:0;left:0;width:min(330px,86vw);z-index:80;background:#fff;
  transform:translateX(-104%);transition:transform .28s cubic-bezier(.2,.8,.25,1);
  display:flex;flex-direction:column;box-shadow:14px 0 40px rgba(16,26,39,.22);
  padding-top:env(safe-area-inset-top)}
.palette.open{transform:none}
.pal-tabs{display:flex;flex-wrap:wrap;gap:5px;padding:12px 12px 8px}
.pchip{flex:1 1 auto;text-align:center;background:var(--panel2);border:1px solid var(--line);
  border-radius:10px;padding:9px 6px;color:var(--grey);font-size:12px;font-weight:700;white-space:nowrap}
.pchip.active{color:#fff}
.pchip[data-cat="location"].active{background:var(--c-location);border-color:var(--c-location)}
.pchip[data-cat="transport"].active{background:var(--c-transport);border-color:var(--c-transport)}
.pchip[data-cat="accommodation"].active{background:var(--c-accommodation);border-color:var(--c-accommodation)}
.pchip[data-cat="activities"].active{background:var(--c-activities);border-color:var(--c-activities)}
.pal-sub{padding:6px 14px 6px;color:var(--grey-2);font-size:11px}
.pal-add{display:flex;gap:7px;padding:2px 12px 12px;border-bottom:1px solid var(--line-2)}
.pal-add input{flex:1;background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 12px}
.pal-add input:focus{outline:2px solid var(--blue);outline-offset:-1px}
.pal-add button{background:var(--blue);border-radius:12px;padding:0 16px;color:#fff;font-weight:800}
.pal-list{flex:1;overflow:auto;padding:12px 12px calc(24px + env(safe-area-inset-bottom));
  display:flex;flex-direction:column;gap:8px}
.pal-empty{color:var(--grey-2);text-align:center;padding:26px 10px;font-size:12.5px;line-height:1.6}
.item{background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px 12px;
  border-left:3px solid var(--grey-2);position:relative}
.item[data-cat="location"]{border-left-color:var(--c-location)}
.item[data-cat="transport"]{border-left-color:var(--c-transport)}
.item[data-cat="accommodation"]{border-left-color:var(--c-accommodation)}
.item[data-cat="activities"]{border-left-color:var(--c-activities)}
.item .nm{font-weight:700;font-size:13px;padding-right:76px}
.item .mt{color:var(--grey-3);font-size:11.5px;margin-top:3px;padding-right:76px}
.item .row-btns{position:absolute;top:8px;right:8px;display:flex;gap:6px}
.iconbtn{background:var(--panel2);border:1px solid var(--line);border-radius:9px;width:32px;height:32px;
  display:grid;place-items:center;color:var(--grey);font-size:13px;padding:0}
.iconbtn.del{color:var(--red)}

/* ---------- day cards ---------- */
.grid{display:grid;grid-template-columns:1fr;gap:12px;align-items:start}
.day{background:#fff;border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.day-h{display:flex;flex-direction:column;gap:7px;padding:12px 14px;
  background:linear-gradient(120deg,var(--navy),#31517A);color:#fff}
.day-h-top{display:flex;align-items:baseline;gap:8px}
.day-h .dn{font-weight:800;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;opacity:.8}
.day-h .dd{color:rgba(255,255,255,.75);font-size:11.5px;margin-left:auto}
/* 16px minimum on every input: below that, iOS Safari zooms the page on focus */
.day-name{width:100%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);
  border-radius:10px;padding:9px 11px;font-weight:700;font-size:16px;color:#fff}
.day-name::placeholder{color:rgba(255,255,255,.6);font-weight:600}
.day-name:focus{outline:none;background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.5)}
.day-body{padding:12px 13px 14px;display:flex;flex-direction:column;gap:14px}
.day-note{width:100%;background:var(--sand);border:1px solid #EFE7D4;border-radius:12px;
  padding:10px 12px;resize:vertical;min-height:52px;font-family:inherit;font-size:16px;color:#5C5442}
.day-note::placeholder{color:#B3A98F}
.day-note:focus{outline:2px solid var(--gold);outline-offset:-1px}
.zone-h{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.zone-h .zt{font-size:10.5px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--grey)}
.zone-h .zadd{margin-left:auto;background:var(--panel2);border:1px solid var(--line);border-radius:999px;
  padding:6px 13px;font-size:12px;color:var(--blue);font-weight:800}
.zone-h .zadd:active{background:var(--blue-soft)}
.zone{min-height:4px;display:flex;flex-direction:column;gap:7px}
.loc-slots{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.slot{border:1.5px dashed var(--line);border-radius:12px;padding:9px 10px;min-height:60px;background:var(--panel2)}
.slot .sl{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--grey-2)}
.slot.filled{background:var(--teal-soft);border-style:solid;border-color:#B8DEE3}
.chip{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);
  border-radius:11px;padding:10px 11px;font-size:13px;border-left:3px solid var(--grey-2)}
.chip[data-cat="location"]{border-left-color:var(--c-location)}
.chip[data-cat="transport"]{border-left-color:var(--c-transport)}
.chip[data-cat="accommodation"]{border-left-color:var(--c-accommodation)}
.chip[data-cat="activities"]{border-left-color:var(--c-activities)}
.chip .cn{font-weight:700;flex:1;min-width:0;word-break:break-word}
.chip .cm{color:var(--grey-2);font-size:11px;white-space:nowrap}
.chip .x{color:var(--grey-2);font-size:20px;line-height:1;padding:0 4px;flex:none}
.zone .empty,.slot .empty{color:var(--grey-2);font-size:11.5px;padding:4px 0}
.slot .empty{padding-top:8px}

/* ---------- modals ---------- */
.ovl{position:fixed;inset:0;background:rgba(16,26,39,.5);z-index:90;
  display:none;align-items:flex-end;justify-content:center;overflow:auto}
.ovl.show{display:flex}
.modal{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:640px;
  box-shadow:0 -12px 50px rgba(16,26,39,.3);overflow:hidden;
  max-height:94vh;display:flex;flex-direction:column}
.m-h{display:flex;align-items:center;gap:9px;padding:14px 16px;border-bottom:1px solid var(--line-2);flex:none}
.m-h b{font-size:15px;font-weight:800}
.m-h .tagcat{font-size:10.5px;font-weight:800;color:#fff;padding:3px 10px;border-radius:999px}
.m-h .x{margin-left:auto;font-size:24px;color:var(--grey-2);padding:0 6px;line-height:1}
.m-b{padding:14px 16px;display:flex;flex-direction:column;gap:13px;overflow:auto;flex:1;
  -webkit-overflow-scrolling:touch}
.m-f{padding:12px 16px calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--line-2);
  display:flex;gap:9px;justify-content:flex-end;background:#fff;flex:none}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:11px;font-weight:800;color:var(--grey);letter-spacing:.4px;text-transform:uppercase}
.fld input,.fld select,.fld textarea{background:#fff;border:1px solid var(--line);border-radius:12px;
  padding:12px;width:100%}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:2px solid var(--blue);outline-offset:-1px}
.fld textarea{resize:vertical;min-height:70px}
.f2,.f3{display:grid;grid-template-columns:1fr;gap:11px}
.sec{border:1px solid var(--line);border-radius:14px;padding:13px;background:var(--panel2)}
.sec h4{margin:0 0 10px;font-size:10.5px;text-transform:uppercase;letter-spacing:1.5px;color:var(--blue);font-weight:800}
.checks{display:flex;flex-wrap:wrap;gap:7px}
.chk{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);
  border-radius:10px;padding:10px 12px;font-size:13px;cursor:pointer;user-select:none}
.chk input{margin:0;accent-color:var(--blue);width:17px;height:17px}
.chk.on{border-color:var(--blue);background:var(--blue-soft);color:var(--blue);font-weight:700}
.amen-tools{display:flex;align-items:center;gap:8px;margin-bottom:9px;flex-wrap:wrap}
.amen-tools input#e_amen_search{flex:1;min-width:140px;background:#fff;border:1px solid var(--line);
  border-radius:10px;padding:10px 12px}
.amen-tools #e_amen_count{margin-left:auto}
.amen-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:210px;overflow:auto;padding-right:4px}
.amen-grid .chk{font-size:12px;padding:8px 9px}
.amen-grid .chk.hide{display:none}
.radio-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.mini{font-size:11px;color:var(--grey-2)}
.btn{background:var(--blue);border-radius:12px;padding:12px 18px;color:#fff;font-weight:800;font-size:13.5px}
.btn.ghost{background:#fff;border:1px solid var(--line);color:var(--grey)}
.btn.danger{background:none;border:1px solid var(--red-soft);color:var(--red);margin-right:auto}

/* ---------- picker ---------- */
.pick-list{display:flex;flex-direction:column;gap:8px}
.pick{display:flex;align-items:center;gap:9px;border:1px solid var(--line);border-radius:12px;
  padding:13px 12px;cursor:pointer;background:#fff}
.pick:active{border-color:var(--blue);background:var(--blue-soft)}
.pick .pn{font-weight:700;flex:1}
.pick .pm{font-size:11px;color:var(--grey-2)}

.mobile-only{display:inline-grid}
.desktop-only{display:none}

/* ---------- wider screens: keep the phone layout, just breathe ---------- */
@media (min-width:900px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(330px,1fr))}
  .board{max-width:1500px;padding:18px}
  .f2{grid-template-columns:1fr 1fr}
  .f3{grid-template-columns:1fr 1fr 1fr}
  .amen-grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}
  .ovl{align-items:flex-start;padding:34px 16px}
  .modal{border-radius:20px;max-height:86vh}
  .desktop-only{display:inline-grid}
}
</style>
</head>
<body>

<header>
  <button class="hbtn" id="btnPalette" title="Item library">&#9776;</button>
  <div class="brand"><small>Edit the plan</small><b id="brandTitle">Vietnam 2026</b></div>
  <span class="saveflag" id="saveflag">Saved</span>
  <button class="hbtn" id="btnSync" title="Sync">&#9729;</button>
  <button class="hbtn" id="btnSetup" title="Trip setup">&#9881;</button>
  <a class="hbtn primary" id="btnApp" href="../" title="Back to the trip app">Done</a>
</header>

<div class="palbackdrop" id="palBackdrop"></div>
<div class="wrap">
  <!-- LIBRARY -->
  <aside class="palette" id="palette">
    <div class="pal-tabs" id="palTabs"></div>
    <div class="pal-sub" id="palSub">9 items · tap + Add on a day</div>
    <div class="pal-add">
      <input id="newItemName" placeholder="New item name…" autocomplete="off">
      <button id="btnAddItem">Add</button>
    </div>
    <div class="pal-list" id="palList"></div>
  </aside>

  <!-- BOARD -->
  <main class="board">
    <div class="board-head">
      <h2 id="boardTitle">Vietnam 2026 — Itinerary</h2>
      <div class="legend">
        <span><i class="dot" style="background:var(--c-location)"></i>Location</span>
        <span><i class="dot" style="background:var(--c-transport)"></i>Transport</span>
        <span><i class="dot" style="background:var(--c-accommodation)"></i>Accommodation</span>
        <span><i class="dot" style="background:var(--c-activities)"></i>Activities</span>
      </div>
    </div>
    <div class="grid" id="board"></div>
  </main>
</div>

<!-- Editor / picker / setup overlays -->
<div class="ovl" id="ovlEdit"><div class="modal wide" id="editModal"></div></div>
<div class="ovl" id="ovlPick"><div class="modal" id="pickModal"></div></div>
<div class="ovl" id="ovlSetup"><div class="modal" id="setupModal"></div></div>

<script>
"use strict";
/* ============================================================= CONFIG */
const CATS = [
  {key:"location",      label:"Locations",     one:"Location"},
  {key:"transport",     label:"Transport",     one:"Transport"},
  {key:"accommodation", label:"Accommodation", one:"Accommodation"},
  {key:"activities",    label:"Activities",    one:"Activity"}
];
const CAT_COLOR = {location:"--c-location",transport:"--c-transport",accommodation:"--c-accommodation",activities:"--c-activities"};
const TRANSPORT_CATS = ["Flight","Bus","Train","Taxi","Organised"];
const AMENITIES = [
  "Air conditioning","Free WiFi","Flat-screen TV","Balcony","Terrace","City view","Landmark view",
  "Soundproofing","Private kitchen","Kitchenette","Kitchenware","Attached bathroom","Shared toilet",
  "Free toiletries","Shower","Bidet","Toilet","Toilet paper","Towels","Linens","Slippers","Hairdryer",
  "Washing machine","Dryer","Iron","Ironing facilities","Drying rack for clothing","Clothes rack",
  "Wardrobe or closet","Walk-in closet","Suit press","Desk","Seating area","Dining area","Dining table",
  "Refrigerator","Microwave","Electric kettle","Stovetop","Fireplace","Heating","Fan","Telephone",
  "Satellite channels","Cable channels","Socket near the bed","Cleaning products","Hypoallergenic",
  "Hardwood or parquet floors","Private entrance","Outdoor furniture","Outdoor dining area",
  "Executive lounge access","Upper floors accessible by elevator","Entire unit wheelchair accessible",
  "Child safety socket covers","Baby safety gates","Hand sanitizer","Sanitizer"
];
const LS_KEY = "vietnam_itinerary_builder_v2";

/* ============================================================= STATE */
let state = loadState();
let activeCat = "location";

function defaultState(){
  return {
    meta:{title:"Vietnam 2026", startDate:"", numDays:15},
    items:{location:[],transport:[],accommodation:[],activities:[]},
    todos:[],
    days: Array.from({length:15}, emptyDay),
    savedAt:0
  };
}
function emptyDay(){ return {name:"", note:"", locStart:null, locEnd:null, transport:[], accommodation:[], activities:[]}; }
function uid(){ return "i"+Date.now().toString(36)+Math.floor(Math.random()*1e5).toString(36); }

function loadState(){
  let embedded=null, ls=null;
  try{ const t=document.getElementById("trip-data").textContent.trim(); if(t && t!=="{}") embedded=JSON.parse(t); }catch(e){}
  try{ const t=localStorage.getItem(LS_KEY); if(t) ls=JSON.parse(t); }catch(e){}
  let s=null;
  if(embedded && ls) s = (ls.savedAt||0) >= (embedded.savedAt||0) ? ls : embedded;
  else s = embedded || ls;
  if(!s) return defaultState();
  return migrate(s);
}
function migrate(s){
  s.meta = Object.assign({title:"Vietnam 2026",startDate:"",numDays:15}, s.meta||{});
  s.items = Object.assign({location:[],transport:[],accommodation:[],activities:[]}, s.items||{});
  if(!Array.isArray(s.todos)) s.todos=[];
  if(!Array.isArray(s.days)) s.days=[];
  const n=s.meta.numDays||s.days.length||15;
  while(s.days.length<n) s.days.push(emptyDay());
  s.days.length=n;
  s.days=s.days.map(d=>Object.assign(emptyDay(),d));
  s.meta.numDays=n;
  return s;
}
function autosave(){
  state.savedAt=Date.now();
  try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){}
  /* the plan is SHARED — push it up (no-op until signed in / sync loaded) */
  window.VNSync?.pushPlan?.(state);
  flag(window.VNSync?.state?.user
    ? "Saved · syncing to both phones · "+timeStr()
    : "Saved on this device · "+timeStr());
}
/* sync.js hands us a newer plan from the other person */
window.VNBuilder={
  applyRemotePlan(remote){
    if(!remote||!remote.days||(remote.savedAt||0)<=(state.savedAt||0))return;
    /* don't yank the board out from under someone mid-edit */
    const el=document.activeElement;
    if(el&&(el.tagName==="INPUT"||el.tagName==="TEXTAREA")&&el.closest(".board"))return;
    state=migrate(remote);
    renderTabs(); renderLibrary(); renderBoard();
    flag("Updated from "+(window.VNSync?.state?.user?.displayName||"the other phone"));
  }
};
function timeStr(){ const d=new Date(); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
function flag(t){ document.getElementById("saveflag").textContent=t; }

/* ============================================================= HELPERS */
function getItem(id){ for(const c of CATS){ const f=state.items[c.key].find(x=>x.id===id); if(f) return f; } return null; }
function itemCat(id){ for(const c of CATS){ if(state.items[c.key].some(x=>x.id===id)) return c.key; } return null; }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function money(v){ v=(v==null?"":String(v)).trim(); if(!v) return ""; return /^[\d.,\s]+$/.test(v)? v : v; }

function newItem(cat,name){
  const base={id:uid(), cat, name:name||"Untitled"};
  if(cat==="location") return base;
  if(cat==="transport") return Object.assign(base,{tcat:"Flight",cost:"",duration:"",pickup:"",dropoff:"",
    airline:"",boardingTime:"",gate:"",seat:"",lounge:"",busName:"",plate:"",cancelDate:"",cancelTime:"",notes:""});
  if(cat==="accommodation") return Object.assign(base,{
    checkinDate:"",checkinTime:"",checkoutDate:"",checkoutTime:"",cost:"",address:"",url:"",cancelDate:"",cancelTime:"",
    beds:{twin:false,doubleShared:false,doubleEach:false,other:""},
    breakfast:{status:"",cost:""}, shuttle:{status:"",cost:""}, amenities:[]
  });
  if(cat==="activities") return Object.assign(base,{timeStart:"",timeEnd:"",location:"",website:"",cost:"",cancelDate:"",cancelTime:""});
  return base;
}

/* short summary line shown on library chips + day chips */
function summary(it){
  if(!it) return "";
  if(it.cat==="location") return "";
  if(it.cat==="transport"){ const p=[it.tcat]; const who=it.airline||it.busName; if(who)p.push(who); if(it.seat)p.push("Seat "+it.seat); if(it.duration)p.push(it.duration); if(it.cost)p.push(money(it.cost)); return p.filter(Boolean).join(" · "); }
  if(it.cat==="accommodation"){ const p=[]; if(it.checkinDate)p.push("in "+it.checkinDate); if(it.cost)p.push(money(it.cost)); return p.join(" · "); }
  if(it.cat==="activities"){ const p=[]; if(it.timeStart)p.push(it.timeStart+(it.timeEnd?"–"+it.timeEnd:"")); if(it.cost)p.push(money(it.cost)); return p.join(" · "); }
  return "";
}

/* ============================================================= LIBRARY UI */
function renderTabs(){
  const el=document.getElementById("palTabs");
  el.innerHTML = CATS.map(c=>`<button class="pchip ${c.key===activeCat?"active":""}" data-cat="${c.key}">${c.label}</button>`).join("");
  el.querySelectorAll(".pchip").forEach(b=>b.onclick=()=>{ activeCat=b.dataset.cat; renderTabs(); renderLibrary(); });
}
function renderLibrary(){
  const cat=activeCat, list=state.items[cat];
  document.getElementById("palSub").textContent =
    cat==="location" ? "Locations (start / end points — no details)" :
    `${list.length} item${list.length!==1?"s":""} · tap + Add on a day`;
  const el=document.getElementById("palList");
  if(!list.length){ el.innerHTML=`<div class="pal-empty">No ${CATS.find(c=>c.key===cat).label.toLowerCase()} yet.<br>Type a name above and click <b>Add</b> to create one.</div>`; return; }
  el.innerHTML = list.map(it=>{
    const s=summary(it);
    return `<div class="item" data-cat="${it.cat}" data-id="${it.id}">
      <div class="nm">${esc(it.name)}</div>
      ${s?`<div class="mt">${esc(s)}</div>`:""}
      <div class="row-btns">
        ${it.cat!=="location"?`<button class="iconbtn" data-act="edit" title="Edit details">✎</button>`:`<button class="iconbtn" data-act="rename" title="Rename">✎</button>`}
        <button class="iconbtn del" data-act="del" title="Delete item">🗑</button>
      </div>
    </div>`;
  }).join("");
  el.querySelectorAll(".item").forEach(node=>{
    const id=node.dataset.id;
    node.querySelector('[data-act="del"]').onclick=e=>{ e.stopPropagation(); delItem(id); };
    const editBtn=node.querySelector('[data-act="edit"]'); if(editBtn) editBtn.onclick=e=>{ e.stopPropagation(); openEditor(id); };
    const renBtn=node.querySelector('[data-act="rename"]'); if(renBtn) renBtn.onclick=e=>{ e.stopPropagation(); renameItem(id); };
    node.querySelector(".nm").onclick=()=>{ it_cat(id)==="location"?renameItem(id):openEditor(id); };
  });
}
function it_cat(id){ return itemCat(id); }

function addItem(){
  const inp=document.getElementById("newItemName");
  const name=inp.value.trim(); if(!name) return;
  const it=newItem(activeCat,name);
  state.items[activeCat].push(it);
  inp.value=""; autosave(); renderLibrary();
  if(activeCat!=="location") openEditor(it.id);
}
function renameItem(id){
  const it=getItem(id); if(!it) return;
  const v=prompt("Item name:", it.name); if(v==null) return;
  it.name=v.trim()||it.name; autosave(); renderLibrary(); renderBoard();
}
function delItem(id){
  const it=getItem(id); if(!it) return;
  if(!confirm(`Delete “${it.name}”? It will be removed from all days.`)) return;
  const cat=it.cat;
  state.items[cat]=state.items[cat].filter(x=>x.id!==id);
  state.days.forEach(d=>{
    if(d.locStart===id) d.locStart=null;
    if(d.locEnd===id) d.locEnd=null;
    d.transport=d.transport.filter(x=>x!==id);
    d.accommodation=d.accommodation.filter(x=>x!==id);
    d.activities=d.activities.filter(x=>x!==id);
  });
  autosave(); renderLibrary(); renderBoard();
}

/* ============================================================= BOARD UI */
function dayDate(i){
  if(!state.meta.startDate) return "";
  const p=state.meta.startDate.split("-").map(Number);
  if(p.length!==3) return "";
  const d=new Date(p[0],p[1]-1,p[2]); d.setDate(d.getDate()+i);
  return d.toLocaleDateString(undefined,{weekday:"short",day:"numeric",month:"short"});
}
function renderBoard(){
  document.getElementById("boardTitle").textContent = state.meta.title+" — Itinerary";
  document.getElementById("brandTitle").textContent = state.meta.title;
  const el=document.getElementById("board");
  el.innerHTML = state.days.map((d,i)=>dayCard(d,i)).join("");
  wireBoard();
}
function chipHTML(id){
  const it=getItem(id); if(!it) return "";
  const s=summary(it);
  return `<div class="chip" data-cat="${it.cat}" data-id="${it.id}">
    <span class="cn" title="Edit details">${esc(it.name)}</span>
    ${s?`<span class="cm">${esc(s)}</span>`:""}
    <button class="x" title="Remove from day">×</button>
  </div>`;
}
function slotHTML(d,i,which){
  const id=which==="start"?d.locStart:d.locEnd;
  const it=id?getItem(id):null;
  return `<div class="slot ${it?"filled":""}" data-day="${i}" data-slot="${which}">
    <div class="sl">${which==="start"?"Start":"End"}</div>
    ${it?`<div class="chip" data-cat="location" data-id="${it.id}" style="margin-top:5px">
        <span class="cn">${esc(it.name)}</span><button class="x" title="Clear">×</button></div>`
      :`<div class="empty">drop / + add</div>`}
  </div>`;
}
function zoneHTML(d,i,cat){
  const ids=d[cat];
  const label=cat==="transport"?"Transport":cat==="accommodation"?"Accommodation":"Activities";
  return `<div>
    <div class="zone-h">
      <span class="dot" style="background:var(${CAT_COLOR[cat]})"></span>
      <span class="zt">${label}</span>
      <button class="zadd" data-day="${i}" data-zone="${cat}">+ Add</button>
    </div>
    <div class="zone" data-day="${i}" data-zone="${cat}">
      ${ids.length?ids.map(chipHTML).join(""):`<div class="empty">none</div>`}
    </div>
  </div>`;
}
function dayCard(d,i){
  return `<div class="day">
    <div class="day-h">
      <div class="day-h-top"><span class="dn">Day ${i+1}</span><span class="dd">${esc(dayDate(i))}</span></div>
      <input class="day-name" data-day="${i}" placeholder="＋ name this day…" value="${esc(d.name||"")}" autocomplete="off">
    </div>
    <div class="day-body">
      <div>
        <div class="zone-h"><span class="dot" style="background:var(--c-location)"></span><span class="zt">Location</span></div>
        <div class="loc-slots">${slotHTML(d,i,"start")}${slotHTML(d,i,"end")}</div>
      </div>
      ${zoneHTML(d,i,"transport")}
      ${zoneHTML(d,i,"accommodation")}
      ${zoneHTML(d,i,"activities")}
      <div>
        <div class="zone-h"><span class="dot" style="background:var(--faint)"></span><span class="zt">Notes</span></div>
        <textarea class="day-note" data-day="${i}" placeholder="Day notes, reminders, ideas…">${esc(d.note||"")}</textarea>
      </div>
    </div>
  </div>`;
}
function wireBoard(){
  const board=document.getElementById("board");
  // chip edit + remove
  board.querySelectorAll(".chip").forEach(chip=>{
    const id=chip.dataset.id;
    const cn=chip.querySelector(".cn"); if(cn) cn.onclick=()=>{ itemCat(id)==="location"?renameItem(id):openEditor(id); };
    const x=chip.querySelector(".x"); if(x) x.onclick=()=>removeFromDay(chip);
  });
  // + Add buttons (zones)
  board.querySelectorAll(".zadd").forEach(b=>b.onclick=()=>openPicker(+b.dataset.day,b.dataset.zone));
  // slot add via click empty
  board.querySelectorAll(".slot").forEach(slot=>{
    const empty=slot.querySelector(".empty");
    if(empty) empty.onclick=()=>openPicker(+slot.dataset.day,"location",slot.dataset.slot);
  });
  // day name + notes (update state on input without re-render so focus is kept; persist on blur)
  board.querySelectorAll(".day-name").forEach(inp=>{
    inp.addEventListener("input",()=>{ state.days[+inp.dataset.day].name=inp.value; });
    inp.addEventListener("change",autosave);
  });
  board.querySelectorAll(".day-note").forEach(ta=>{
    ta.addEventListener("input",()=>{ state.days[+ta.dataset.day].note=ta.value; });
    ta.addEventListener("change",autosave);
  });
}
function removeFromDay(chip){
  const id=chip.dataset.id;
  // find day context
  const slot=chip.closest(".slot");
  if(slot){ const day=+slot.dataset.day; state.days[day][slot.dataset.slot==="start"?"locStart":"locEnd"]=null; autosave(); renderBoard(); return; }
  const zone=chip.closest(".zone"); if(!zone) return;
  const day=+zone.dataset.day, zc=zone.dataset.zone;
  state.days[day][zc]=state.days[day][zc].filter(x=>x!==id); autosave(); renderBoard();
}

/* ============================================================= PICKER */
let pickCtx=null;
function openPicker(day,zone,slot){
  pickCtx={day,zone,slot};
  const cat=zone==="location"?"location":zone;
  const list=state.items[cat];
  const m=document.getElementById("pickModal");
  m.innerHTML=`
    <div class="m-h">
      <span class="tagcat" style="background:var(${CAT_COLOR[cat]})">${CATS.find(c=>c.key===cat).one}</span>
      <b>Add to Day ${day+1}${slot?" · "+slot:""}</b>
      <button class="x" onclick="closeOvl('ovlPick')">×</button>
    </div>
    <div class="m-b">
      <div class="pal-add" style="padding:0;border:none">
        <input id="pickNew" placeholder="Create new ${CATS.find(c=>c.key===cat).one.toLowerCase()}…" autocomplete="off">
        <button id="pickAddNew">Create</button>
      </div>
      <div class="pick-list">
        ${list.length?list.map(it=>`<div class="pick" data-id="${it.id}">
            <div><div class="pn">${esc(it.name)}</div>${summary(it)?`<div class="pm">${esc(summary(it))}</div>`:""}</div>
          </div>`).join(""):`<div class="pal-empty">No items yet — create one above.</div>`}
      </div>
    </div>`;
  m.querySelectorAll(".pick").forEach(p=>p.onclick=()=>{ placeItem(p.dataset.id); });
  m.querySelector("#pickAddNew").onclick=()=>{
    const v=m.querySelector("#pickNew").value.trim(); if(!v) return;
    const it=newItem(cat,v); state.items[cat].push(it); placeItem(it.id,true);
  };
  m.querySelector("#pickNew").addEventListener("keydown",e=>{ if(e.key==="Enter") m.querySelector("#pickAddNew").click(); });
  showOvl("ovlPick");
}
function placeItem(id,editAfter){
  const {day,zone,slot}=pickCtx;
  if(zone==="location"){ state.days[day][slot==="start"?"locStart":"locEnd"]=id; }
  else { if(!state.days[day][zone].includes(id)) state.days[day][zone].push(id); }
  autosave(); closeOvl("ovlPick"); renderLibrary(); renderBoard();
  if(editAfter && zone!=="location") openEditor(id);
}

/* ============================================================= EDITOR */
let editId=null;
function openEditor(id){
  const it=getItem(id); if(!it) return;
  editId=id;
  const m=document.getElementById("editModal");
  m.innerHTML=`
    <div class="m-h">
      <span class="tagcat" style="background:var(${CAT_COLOR[it.cat]})">${CATS.find(c=>c.key===it.cat).one}</span>
      <b>Edit details</b>
      <button class="x" onclick="closeOvl('ovlEdit')">×</button>
    </div>
    <div class="m-b">${editorFields(it)}</div>
    <div class="m-f">
      <button class="btn danger" onclick="delItem('${it.id}');closeOvl('ovlEdit')">Delete item</button>
      <button class="btn ghost" onclick="closeOvl('ovlEdit')">Cancel</button>
      <button class="btn" id="saveEdit">Save details</button>
    </div>`;
  wireEditor(it);
  m.querySelector("#saveEdit").onclick=()=>{ collectEditor(it); autosave(); closeOvl("ovlEdit"); renderLibrary(); renderBoard(); };
  showOvl("ovlEdit");
}
function editorFields(it){

    <div class="tfield" data-when="Flight"><div class="f2">
      <div class="fld"><label>Airline</label><input id="e_airline" value="${esc(it.airline)}" placeholder="e.g. Vietnam Airlines"></div>

    <div class="tfield" data-when="Bus,Taxi"><div class="fld"><label>License plate</label><input id="e_plate" value="${esc(it.plate)}" placeholder="e.g. 51F-123.45"></div></div>

    <div class="tfield" data-when="Flight,Bus,Train"><div class="fld"><label>Seat number(s)</label><input id="e_seat" value="${esc(it.seat)}" placeholder="e.g. 14A, 14B"></div></div>

    <div class="tfield" data-when="Bus,Taxi,Train,Organised"><div class="f2">
      <div class="fld"><label>Pickup location</label><input id="e_pickup" value="${esc(it.pickup)}" placeholder="Pickup point"></div>

    </div></div>

      <div class="fld"><label>Time</label><input id="e_cancelTime" type="time" value="${esc(it.cancelTime)}"></div>
    </div>
    <div class="fld"><label>Other notes</label><textarea id="e_notes">${esc(it.notes)}</textarea></div>`;
  }
  if(it.cat==="activities"){
    return nameFld+`
    <div class="f2">
      <div class="fld"><label>Time start</label><input id="e_timeStart" type="time" value="${esc(it.timeStart)}"></div>
      <div class="fld"><label>Time end</label><input id="e_timeEnd" type="time" value="${esc(it.timeEnd)}"></div>
    </div>
    <div class="fld"><label>Location</label><input id="e_location" value="${esc(it.location)}"></div>
    <div class="f2">
      <div class="fld"><label>Website</label><input id="e_website" value="${esc(it.website)}" placeholder="https://"></div>
      <div class="fld"><label>Costs</label><input id="e_cost" value="${esc(it.cost)}"></div>
    </div>
    <div class="f2">
      <div class="fld"><label>Free cancellation until — date <span class="mini">(before event)</span></label><input id="e_cancelDate" type="date" value="${esc(it.cancelDate)}"></div>
      <div class="fld"><label>Time</label><input id="e_cancelTime" type="time" value="${esc(it.cancelTime)}"></div>
    </div>`;

  if(it.cat==="accommodation"){
    const b=it.beds||{}, bf=it.breakfast||{}, sh=it.shuttle||{}, am=it.amenities||[];
    const amenSet=Array.from(new Set([...AMENITIES,...am]));
    return nameFld+`
    <div class="f2">
      <div class="fld"><label>Check-in date</label><input id="e_checkinDate" type="date" value="${esc(it.checkinDate)}"></div>
      <div class="fld"><label>Check-in time</label><input id="e_checkinTime" type="time" value="${esc(it.checkinTime)}"></div>
    </div>
    <div class="f2">
      <div class="fld"><label>Check-out date</label><input id="e_checkoutDate" type="date" value="${esc(it.checkoutDate)}"></div>

      <div class="fld"><label>Time</label><input id="e_cancelTime" type="time" value="${esc(it.cancelTime)}"></div>

    <div class="sec"><h4>Beds</h4>
      <div class="checks" id="e_beds">
        ${bedChk("twin","Twin Beds",b.twin)}

    </div>

    ${incExcSec("breakfast","Breakfast",bf)}
    ${incExcSec("shuttle","Airport Shuttle",sh)}

    <div class="sec"><h4>Amenities</h4>

        <input id="e_amen_search" placeholder="🔍 Search amenities…" autocomplete="off">

      </div>
      <div class="amen-grid" id="e_amen">

      </div>
      <div class="mini amen-none" id="e_amen_none" style="display:none;padding:6px 2px">No matches — type it below to add as a custom amenity.</div>

function bedChk(k,label,on){ return `<label class="chk ${on?"on":""}" data-bed="${k}"><input type="checkbox" ${on?"checked":""}>${label}</label>`; }
function incExcSec(key,label,obj){
  const st=obj.status||"";
  return `<div class="sec"><h4>${label}</h4>
    <div class="radio-row">
      <label class="chk ${st==="included"?"on":""}"><input type="radio" name="${key}_st" value="included" ${st==="included"?"checked":""}>Included</label>
      <label class="chk ${st==="excluded"?"on":""}"><input type="radio" name="${key}_st" value="excluded" ${st==="excluded"?"checked":""}>Excluded</label>
      <label class="chk ${st===""?"on":""}"><input type="radio" name="${key}_st" value="" ${st===""?"checked":""}>—</label>
      <div class="fld" style="flex:1;min-width:120px"><input id="e_${key}_cost" value="${esc(obj.cost||"")}" placeholder="Cost (if any)"></div>
    </div></div>`;
}
function updateTransportFields(cat){
  const m=document.getElementById("editModal");
  m.querySelectorAll(".tfield").forEach(g=>{
    const when=(g.dataset.when||"").split(",");
    g.style.display = when.includes(cat) ? "" : "none";
  });
}
function wireEditor(it){
  const m=document.getElementById("editModal");
  if(it.cat==="transport"){
    const sel=m.querySelector("#e_tcat");
    const upd=()=>updateTransportFields(sel.value);
    sel.addEventListener("change",upd); upd();
  }
  // toggle .on class on checkbox labels
  m.querySelectorAll(".chk input").forEach(inp=>{
    inp.addEventListener("change",()=>{
      if(inp.type==="radio"){ m.querySelectorAll(`input[name="${inp.name}"]`).forEach(r=>r.closest(".chk").classList.toggle("on",r.checked)); }
      else inp.closest(".chk").classList.toggle("on",inp.checked);
    });
  });
  if(it.cat==="accommodation"){
    const addBtn=m.querySelector("#e_amen_add");
    if(addBtn) addBtn.onclick=()=>{
      const inp=m.querySelector("#e_amen_new"); const v=inp.value.trim(); if(!v) return;
      const grid=m.querySelector("#e_amen");
      if([...grid.querySelectorAll("input")].some(x=>x.value.toLowerCase()===v.toLowerCase())){ inp.value=""; return; }
      const lab=document.createElement("label"); lab.className="chk on";
      lab.innerHTML=`<input type="checkbox" value="${esc(v)}" checked>${esc(v)}`;
      lab.querySelector("input").addEventListener("change",e=>lab.classList.toggle("on",e.target.checked));
      grid.appendChild(lab); inp.value="";
    };
    const ai=m.querySelector("#e_amen_new"); if(ai) ai.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();addBtn.click();}});

    // search / filter amenities
    const search=m.querySelector("#e_amen_search");
    const selOnly=m.querySelector("#e_amen_selonly input");
    const grid=m.querySelector("#e_amen");
    const none=m.querySelector("#e_amen_none");
    const count=m.querySelector("#e_amen_count");
    function applyAmenFilter(){
      const q=(search.value||"").trim().toLowerCase();
      const only=selOnly.checked;
      let shown=0, selected=0;
      grid.querySelectorAll(".chk").forEach(lab=>{
        const cb=lab.querySelector("input");
        const on=cb.checked; if(on) selected++;
        const text=cb.value.toLowerCase();
        const match=(!q||text.includes(q)) && (!only||on);
        lab.classList.toggle("hide",!match);
        if(match) shown++;
      });
      none.style.display = shown===0 ? "block" : "none";
      count.textContent = selected+" selected";
    }
    if(search) search.addEventListener("input",applyAmenFilter);
    if(selOnly) selOnly.addEventListener("change",applyAmenFilter);
    // keep count/filter fresh when amenities are toggled or added
    grid.addEventListener("change",applyAmenFilter);
    const origAdd=addBtn.onclick; addBtn.onclick=()=>{ origAdd(); applyAmenFilter(); };
    applyAmenFilter();
  }
}
function val(id){ const el=document.getElementById(id); return el?el.value.trim():""; }
function collectEditor(it){
  it.name=val("e_name")||it.name;
  if(it.cat==="transport"){ it.tcat=val("e_tcat"); it.cost=val("e_cost"); it.duration=val("e_duration");
    it.airline=val("e_airline"); it.boardingTime=val("e_boardingTime"); it.gate=val("e_gate"); it.seat=val("e_seat"); it.lounge=val("e_lounge");
    it.busName=val("e_busName"); it.plate=val("e_plate"); it.pickup=val("e_pickup"); it.dropoff=val("e_dropoff");
    it.cancelDate=val("e_cancelDate"); it.cancelTime=val("e_cancelTime"); it.notes=val("e_notes"); }
  else if(it.cat==="activities"){ it.timeStart=val("e_timeStart"); it.timeEnd=val("e_timeEnd"); it.location=val("e_location"); it.website=val("e_website"); it.cost=val("e_cost"); it.cancelDate=val("e_cancelDate"); it.cancelTime=val("e_cancelTime"); }
  else if(it.cat==="accommodation"){
    it.checkinDate=val("e_checkinDate"); it.checkinTime=val("e_checkinTime");
    it.checkoutDate=val("e_checkoutDate"); it.checkoutTime=val("e_checkoutTime");
    it.cost=val("e_cost"); it.url=val("e_url"); it.address=val("e_address");
    it.cancelDate=val("e_cancelDate"); it.cancelTime=val("e_cancelTime");
    const m=document.getElementById("editModal");
    it.beds={
      twin:m.querySelector('[data-bed="twin"] input').checked,
      doubleShared:m.querySelector('[data-bed="doubleShared"] input').checked,
      doubleEach:m.querySelector('[data-bed="doubleEach"] input').checked,
      other:val("e_beds_other")
    };
    const rad=n=>{ const x=m.querySelector(`input[name="${n}"]:checked`); return x?x.value:""; };
    it.breakfast={status:rad("breakfast_st"),cost:val("e_breakfast_cost")};
    it.shuttle={status:rad("shuttle_st"),cost:val("e_shuttle_cost")};
    it.amenities=[...m.querySelectorAll("#e_amen input:checked")].map(x=>x.value);
  }
}

/* ============================================================= SETUP */
function openSetup(){
  const m=document.getElementById("setupModal");
  m.innerHTML=`
    <div class="m-h"><b>Trip Setup</b><button class="x" onclick="closeOvl('ovlSetup')">×</button></div>
    <div class="m-b">
      <div class="fld"><label>Trip title</label><input id="s_title" value="${esc(state.meta.title)}"></div>
      <div class="f2">
        <div class="fld"><label>Start date (Day 1)</label><input id="s_start" type="date" value="${esc(state.meta.startDate)}"></div>
        <div class="fld"><label>Number of days</label><input id="s_days" type="number" min="1" max="60" value="${state.meta.numDays}"></div>
      </div>
      <div class="mini">Reducing days removes the last days (and any items placed on them).</div>
    </div>
    <div class="m-f">
      <button class="btn ghost" onclick="closeOvl('ovlSetup')">Cancel</button>
      <button class="btn" id="s_save">Apply</button>
    </div>`;
  m.querySelector("#s_save").onclick=()=>{
    state.meta.title=val("s_title")||state.meta.title;
    state.meta.startDate=val("s_start");
    let n=parseInt(val("s_days"),10); if(isNaN(n)||n<1) n=1; if(n>60) n=60;
    while(state.days.length<n) state.days.push(emptyDay());
    state.days.length=n; state.meta.numDays=n;
    autosave(); closeOvl("ovlSetup"); renderBoard();
  };
  showOvl("ovlSetup");
}

/* ============================================================= TO-DO */
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }

/* ============================================================= REPORT */
function fmtDate(d,t){ if(!d && !t) return ""; return [d,t].filter(Boolean).join(" "); }

/* ============================================================= SAVE */

/* ---- Save in place (File System Access API) ----
   First click: pick Vietnam_Itinerary_Builder.html once and allow editing.
   After that the button overwrites the same file silently — no more
   "(1) (2) (3)" copies in Downloads. The file handle is remembered in
   IndexedDB; if the browser forgets it, you simply pick the file again. */

/* ============================================================= OVERLAY UTIL */
function showOvl(id){ document.getElementById(id).classList.add("show"); }
function closeOvl(id){ document.getElementById(id).classList.remove("show"); }
document.querySelectorAll(".ovl").forEach(o=>o.addEventListener("mousedown",e=>{ if(e.target===o) o.classList.remove("show"); }));
document.addEventListener("keydown",e=>{ if(e.key==="Escape"){ document.querySelectorAll(".ovl.show").forEach(o=>o.classList.remove("show")); closeReport(); } });

/* ============================================================= INIT */
document.getElementById("btnAddItem").onclick=addItem;
document.getElementById("newItemName").addEventListener("keydown",e=>{ if(e.key==="Enter") addItem(); });
document.getElementById("btnSetup").onclick=openSetup;
/* No Save button by design: the plan autosaves and syncs, so a Save button
   would imply the work isn't already safe. Removed with it: save-to-disk and
   report export (both the standalone-file workflow), plan-level to-dos (they
   now live per-person in the app), and drag-and-drop (never fires on touch —
   openPicker is the tap path). */

/* ---------- sync button ---------- */
(function(){
  const b=document.getElementById("btnSync");
  const paint=s=>{
    const on=!!s.user;
    b.textContent=on?"☁":"☁";
    b.title=on?("Synced as "+(s.user.displayName||s.user.email)+" — tap to sign out")
              :(s.status==="error"?(s.error||"Sync error"):"Sign in to sync with the other phone");
    b.style.color=on?"var(--jade-d)":(s.status==="error"?"var(--rose)":"");
    b.style.borderColor=on?"var(--jade)":"";
    const lbl=b.querySelector(".lbl");
    if(lbl)lbl.textContent=on?" Synced":" Sync";
  };
  window.addEventListener("vnsync",e=>paint(e.detail));
  paint({status:"connecting",user:null});
  b.onclick=async()=>{
    const s=window.VNSync?.state;
    if(!window.VNSync?.available){alert("Sync isn't available right now — your changes are still saved on this device.");return;}
    if(s?.user){ if(confirm("Sign out of sync?"))window.VNSync.signOut(); return; }
    try{ await window.VNSync.signIn(); }catch(e){ alert("Sign-in failed: "+(e.code||e.message)); }
  };
})();

/* ---------- mobile palette drawer ---------- */
const palette=document.getElementById("palette"), palBackdrop=document.getElementById("palBackdrop");
function openPalette(){ palette.classList.add("open"); palBackdrop.classList.add("open"); }
function closePalette(){ palette.classList.remove("open"); palBackdrop.classList.remove("open"); }
document.getElementById("btnPalette").onclick=()=>
  palette.classList.contains("open")?closePalette():openPalette();
palBackdrop.onclick=closePalette;
/* the picker modal is the touch path for assigning — close the drawer behind it */
const _openPicker=openPicker;
openPicker=function(...a){ closePalette(); return _openPicker.apply(this,a); };

renderTabs(); renderLibrary(); renderBoard();
flag(state.savedAt?("Loaded · saved "+new Date(state.savedAt).toLocaleDateString()):"New trip");
</script>
